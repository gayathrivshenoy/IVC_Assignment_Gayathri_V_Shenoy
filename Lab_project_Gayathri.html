<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pastel Productivity Dashboard</title>

<style>
/* ✅ SOFT PASTEL THEME */
:root {
  --bg-gradient-start: #f8e1f4;
  --bg-gradient-end: #e1d7f8;
  --card-bg: #ffffff;
  --text-main: #4b3b6b;
  --accent: #b39ddb;
  --accent-soft: #dccbff;
  --shadow-soft: 0 4px 10px rgba(0, 0, 0, 0.08);
  --task-completed-bg: #c8f7dc;
  --calendar-today-bg: #b39ddb;
  --calendar-today-text: #ffffff;
}

body.dark {
  --bg-gradient-start: #2b213a;
  --bg-gradient-end: #15101f;
  --card-bg: #241b33;
  --text-main: #f3e5f5;
  --accent: #ce93d8;
  --accent-soft: #5e4b8b;
  --shadow-soft: 0 4px 18px rgba(0, 0, 0, 0.6);
  --task-completed-bg: #33691e;
  --calendar-today-bg: #7e57c2;
  --calendar-today-text: #ffffff;
}

/* ✅ GLOBAL */
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, var(--bg-gradient-start), var(--bg-gradient-end));
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ✅ TOP BAR */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 30px;
  backdrop-filter: blur(10px);
  background-color: rgba(255, 255, 255, 0.25);
}
body.dark .top-bar { background-color: rgba(0,0,0,0.3); }
.clock { font-size: 18px; font-weight: 600; }

/* ✅ POMODORO */
.pomodoro {
  background-color: var(--card-bg);
  padding: 10px 20px;
  border-radius: 15px;
  box-shadow: var(--shadow-soft);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 260px;
}
.pomodoro-settings { display: flex; gap: 10px; font-size: 12px; }
.pomodoro-settings input {
  width: 70px; padding: 4px;
  border-radius: 8px; border: 1px solid var(--accent-soft);
  background-color: #f9f5ff;
}
.pomodoro-display {
  font-size: 28px; font-weight: bold;
  padding: 6px 12px; border-radius: 10px;
  background-color: var(--accent-soft);
}
.pomodoro-buttons { display: flex; gap: 8px; }
.pomodoro-buttons button {
  padding: 6px 12px; border-radius: 10px;
  border: none; background-color: var(--accent);
  color: white; cursor: pointer;
}

/* ✅ DARK MODE SWITCH */
.switch { position: relative; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc; transition: 0.2s; border-radius: 24px;
}
.slider:before {
  position: absolute; content: "";
  height: 18px; width: 18px;
  left: 3px; top: 3px;
  background-color: white; transition: 0.2s; border-radius: 50%;
}
input:checked + .slider { background-color: var(--accent); }
input:checked + .slider:before { transform: translateX(18px); }

/* ✅ MAIN LAYOUT */
.main-layout {
  display: grid;
  grid-template-columns: 1.1fr 1.7fr;
  gap: 20px;
  padding: 20px 30px 30px;
}

/* ✅ SIDEBAR */
.sidebar {
  background-color: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  box-shadow: var(--shadow-soft);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.task-input-row { display: flex; gap: 8px; }
#taskInput {
  flex: 1; padding: 8px 10px;
  border-radius: 10px; border: 1px solid var(--accent-soft);
  background-color: #f9f5ff;
}
#addTaskButton {
  padding: 8px 14px; border-radius: 10px;
  border: none; background-color: var(--accent);
  color: white; cursor: pointer;
}
.task-list {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 6px;
}
.task-item {
  background-color: #f3e5f5;
  border-radius: 10px; padding: 8px 10px;
  display: flex; justify-content: space-between;
  align-items: center; cursor: grab;
}
.completed { background-color: var(--task-completed-bg); text-decoration: line-through; }

/* ✅ CALENDAR */
.calendar-card {
  background-color: var(--card-bg);
  border-radius: 20px;
  box-shadow: var(--shadow-soft);
  padding: 20px;
}
.calendar-header {
  display: flex; justify-content: space-between; align-items: center;
}
.calendar-nav {
  border: none; border-radius: 50%;
  width: 28px; height: 28px;
  background-color: var(--accent-soft);
  cursor: pointer;
}
.day-labels {
  display: grid; grid-template-columns: repeat(7,1fr);
  text-align: center; font-weight: 600; margin-bottom: 8px;
}
.calendar-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 6px;
}
.calendar-day {
  height: 40px; border-radius: 10px;
  background-color: #f3e5f5;
  display: flex; align-items: center; justify-content: center;
}
.calendar-today {
  background-color: var(--calendar-today-bg);
  color: var(--calendar-today-text);
  font-weight: 700;
}

/* ✅ NOTES */
.notes-card {
  background-color: var(--card-bg);
  border-radius: 20px;
  box-shadow: var(--shadow-soft);
  padding: 20px;
}
.notes-card textarea {
  width: 100%; min-height: 120px;
  border-radius: 12px; border: 1px solid var(--accent-soft);
  padding: 10px; resize: vertical;
  background-color: #f9f5ff;
}
</style>
</head>

<body>

<!-- ✅ TOP BAR -->
<header class="top-bar">
  <div class="clock" id="datetime"></div>

  <div class="pomodoro">
    <h1>Pomodoro Timer</h1>

    <div class="pomodoro-settings">
      <label>Focus <input type="number" id="focusInput" value="25"></label>
      <label>Break <input type="number" id="breakInput" value="5"></label>
    </div>

    <div class="pomodoro-display" id="pomodoroDisplay">25:00</div>

    <div class="pomodoro-buttons">
      <button id="startPomodoro">Start</button>
      <button id="pausePomodoro">Pause</button>
      <button id="resetPomodoro">Reset</button>
    </div>

    <div id="pomodoroStatus">Focus session</div>
  </div>

  <div class="theme-toggle">
    <label class="switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>
</header>

<!-- ✅ MAIN LAYOUT -->
<main class="main-layout">

  <!-- ✅ SIDEBAR -->
  <section class="sidebar">
    <h2>Today's Tasks</h2>

    <div class="task-input-row">
      <input id="taskInput" placeholder="Add a task...">
      <button id="addTaskButton">Add</button>
    </div>

    <ul id="taskList" class="task-list"></ul>

    <h3>Completed Tasks</h3>
    <ul id="completedList" class="task-list"></ul>
  </section>

  <!-- ✅ MAIN CONTENT -->
  <section class="main-content">

    <div class="calendar-card">
      <div class="calendar-header">
        <button id="prevMonth" class="calendar-nav">&lt;</button>
        <div id="calendarTitle"></div>
        <button id="nextMonth" class="calendar-nav">&gt;</button>
      </div>

      <div class="day-labels">
        <div>Mon</div><div>Tue</div><div>Wed</div>
        <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>

      <div class="calendar-grid" id="calendarDays"></div>
    </div>

    <div class="notes-card">
      <h2>Notes</h2>
      <textarea id="notesArea"></textarea>
    </div>

  </section>
</main>

<script>
/* ✅ LIVE CLOCK */
function updateDateTime() {
  const now = new Date();
  document.getElementById("datetime").textContent =
    now.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"}) +
    " | " +
    now.toLocaleTimeString("en-US");
}
setInterval(updateDateTime,1000); updateDateTime();

/* ✅ DARK MODE */
const themeToggle=document.getElementById("themeToggle");
themeToggle.addEventListener("change",()=>document.body.classList.toggle("dark"));

/* ✅ TASKS */
let tasks=[]; let completed=[];
const taskList=document.getElementById("taskList");
const completedList=document.getElementById("completedList");

function renderTasks(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.className="task-item";
    li.innerHTML=`<span>${t}</span><button onclick="completeTask(${i})">Done</button>`;
    taskList.appendChild(li);
  });
}
function renderCompleted(){
  completedList.innerHTML="";
  completed.forEach((t,i)=>{
    const li=document.createElement("li");
    li.className="task-item completed";
    li.innerHTML=`<span>${t}</span><button onclick="deleteCompleted(${i})">Delete</button>`;
    completedList.appendChild(li);
  });
}
function addTask(){
  const val=document.getElementById("taskInput").value.trim();
  if(!val)return;
  tasks.push(val);
  document.getElementById("taskInput").value="";
  renderTasks();
}
function completeTask(i){
  completed.push(tasks[i]);
  tasks.splice(i,1);
  renderTasks(); renderCompleted();
}
function deleteCompleted(i){
  completed.splice(i,1);
  renderCompleted();
}
document.getElementById("addTaskButton").onclick=addTask;

/* ✅ NOTES */
document.getElementById("notesArea").addEventListener("input",e=>{
  localStorage.setItem("notes",e.target.value);
});
document.getElementById("notesArea").value=localStorage.getItem("notes")||"";

/* ✅ CALENDAR */
let currentDate=new Date();
function renderCalendar(){
  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  const start=(first.getDay()+6)%7;
  const total=last.getDate();
  document.getElementById("calendarTitle").textContent=
    first.toLocaleString("en-US",{month:"long"})+" "+year;
  const grid=document.getElementById("calendarDays");
  grid.innerHTML="";
  for(let i=0;i<start;i++){
    const d=document.createElement("div");
    d.className="calendar-day calendar-empty";
    grid.appendChild(d);
  }
  const today=new Date();
  for(let d=1;d<=total;d++){
    const cell=document.createElement("div");
    cell.className="calendar-day";
    cell.textContent=d;
    if(d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear()){
      cell.classList.add("calendar-today");
    }
    grid.appendChild(cell);
  }
}
document.getElementById("prevMonth").onclick=()=>{currentDate.setMonth(currentDate.getMonth()-1);renderCalendar();}
document.getElementById("nextMonth").onclick=()=>{currentDate.setMonth(currentDate.getMonth()+1);renderCalendar();}
renderCalendar();

/* ✅ POMODORO */
// ✅ POMODORO FIXED VERSION
let interval = null;
let isFocus = true;

let focusInput = document.getElementById("focusInput");
let breakInput = document.getElementById("breakInput");
let display = document.getElementById("pomodoroDisplay");
let statusText = document.getElementById("pomodoroStatus");

let remaining = Number(focusInput.value) * 60; // ✅ Start with user’s chosen value

function updateDisplay() {
  let m = Math.floor(remaining / 60);
  let s = remaining % 60;
  display.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

// ✅ When user changes focus time, update remaining time IF in focus mode
focusInput.addEventListener("change", () => {
  if (isFocus) {
    remaining = Number(focusInput.value) * 60;
    updateDisplay();
  }
});

// ✅ When user changes break time, update remaining time IF in break mode
breakInput.addEventListener("change", () => {
  if (!isFocus) {
    remaining = Number(breakInput.value) * 60;
    updateDisplay();
  }
});

function startTimer() {
  if (interval) return;

  // ✅ Always start with the correct time based on mode
  if (remaining <= 0) {
    remaining = (isFocus ? Number(focusInput.value) : Number(breakInput.value)) * 60;
  }

  interval = setInterval(() => {
    remaining--;

    if (remaining <= 0) {
      clearInterval(interval);
      interval = null;

      // ✅ Switch mode
      isFocus = !isFocus;
      statusText.textContent = isFocus ? "Focus session" : "Break session";

      // ✅ Load correct time for new mode
      remaining = (isFocus ? Number(focusInput.value) : Number(breakInput.value)) * 60;
    }

    updateDisplay();
  }, 1000);
}

function pauseTimer() {
  clearInterval(interval);
  interval = null;
}

function resetTimer() {
  pauseTimer();
  isFocus = true;
  statusText.textContent = "Focus session";
  remaining = Number(focusInput.value) * 60; // ✅ Reset uses user’s value
  updateDisplay();
}

document.getElementById("startPomodoro").onclick = startTimer;
document.getElementById("pausePomodoro").onclick = pauseTimer;
document.getElementById("resetPomodoro").onclick = resetTimer;

updateDisplay()

</script>

</body>
</html>
